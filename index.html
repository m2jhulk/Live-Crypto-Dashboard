<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Live Crypto Tracker</h1>
        <p class="subtitle">Fetching real-time market data</p>
    </header>

    <main class="dashboard-grid" id="dashboard">
        
        <article class="crypto-card" id="card-solana">
            <div class="logo-container">
                <img src="https://cryptologos.cc/logos/solana-sol-logo.svg" alt="Solana Logo">
            </div>
            <h2 class="coin-name">Solana</h2>
            <p class="coin-symbol">SOL</p>
            <div class="price-box" id="price-solana">
                <span class="loading">Loading...</span>
            </div>
        </article>

        <article class="crypto-card" id="card-bnb">
            <div class="logo-container">
                <img src="https://cryptologos.cc/logos/bnb-bnb-logo.svg" alt="BNB Logo">
            </div>
            <h2 class="coin-name">BNB</h2>
            <p class="coin-symbol">BNB</p>
            <div class="price-box" id="price-binancecoin">
                <span class="loading">Loading...</span>
            </div>
        </article>

        <article class="crypto-card" id="card-ada">
            <div class="logo-container">
                <img src="https://cryptologos.cc/logos/cardano-ada-logo.svg" alt="Cardano Logo">
            </div>
            <h2 class="coin-name">Cardano</h2>
            <p class="coin-symbol">ADA</p>
            <div class="price-box" id="price-cardano">
                <span class="loading">Loading...</span>
            </div>
        </article>

    </main>

    <script src="script.js"></script>

</body>
</html>
